---
- name: Install netbox
  hosts: netbox
  become: true
  gather_facts: yes
  tasks:
    - name: Update machine
      ansible.builtin.apt:
        upgrade: full
        update_cache: yes

    - name: Install Postgres SQL
      ansible.builtin.apt:
        name: postgresql
        state: present

    - name: Create Netbox DB Progres
      community.postgresql.postgresql_db:
        name: netbox

    - name: Create DB User
      community.postgresql.postgresql_user:
        login_db: netbox
        name: netbox
        password: AlphaNetbox
        expires: infinity

    - name: Makes Netbox the owner of DB
      community.postgresql.postgresql_db:
        name: netbox
        owner: netbox
        state: present

    - name: Grant Create privs on public Scheme
      community.postgresql.postgresql_privs:
        db: netbox
        type: schema
        objs: public
        roles: netbox
        privs: CREATE
        state: present

    - name: Install Redis
      ansible.builtin.apt:
        name: redis-server
        state: present

    - name: Install Netbox
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - build-essential
          - libxml2-dev
          - libxslt1-dev
          - libffi-dev
          - libpq-dev
          - libssl-dev
          - zlib1g-dev
        state: present
        update_cache: yes

    - name: Create netbox directory
      file:
        path: /opt/netbox-v4.5.9
        state: directory

    - name: Download netbox tarball file
      ansible.builtin.get_url:
        url: https://github.com/netbox-community/netbox/archive/refs/tags/v4.5.9.tar.gz
        dest: /opt/netbox-v4.5.9

    - name: Unarchive tarball file
      ansible.builtin.unarchive:
        src: v4.5.9.tar.gz
        dest: /opt/netbox-v4.5.9
        remote_src: yes

    - name: Symlink netbox-V X.X.X  to netbox
      ansible.builtin.file:
        src: /opt/netbox-v4.5.9/netbox-4.5.9
        dest: /opt/netbox
        state: link

    - name: Add netbox user account
      ansible.builtin.user:
        name: netbox
        system: yes
        create_home: no
        shell: /usr/sbin/nologin

    - name: Ensure NetBox directories have correct ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: netbox
        group: netbox
        recurse: yes
      loop:
        - /opt/netbox/netbox/media/
        - /opt/netbox/netbox/reports/
        - /opt/netbox/netbox/scripts/
        # This part for ownership was done by chat

    - name: copy config file
      ansible.builtin.copy:
        src: /opt/netbox/netbox/netbox/configuration_example.py
        dest: /opt/netbox/netbox/netbox/configuration.py
        remote_src: yes
        owner: netbox
        group: netbox
        mode: "0644"

    - name: Generate NetBox SECRET_KEY
      ansible.builtin.command:
        cmd: python3 ../generate_secret_key.py
        chdir: /opt/netbox/netbox/netbox
      register: netbox_secret_key
      changed_when: false
      ### Chat

    - name: Generate NetBox API token pepper
      ansible.builtin.command:
        cmd: python3 ../generate_secret_key.py
        chdir: /opt/netbox/netbox/netbox
      register: netbox_api_pepper
      changed_when: false
      ### CHAT

    ###
    - name: Configure NetBox settings
      ansible.builtin.blockinfile:
        path: /opt/netbox/netbox/netbox/configuration.py
        marker: "# {mark} ANSIBLE MANAGED NETBOX CONFIG"
        block: |
          ALLOWED_HOSTS = ['*']

          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'NAME': 'netbox',
                  'USER': 'netbox',
                  'PASSWORD': 'AlphaNetbox',
                  'HOST': 'localhost',
                  'PORT': '',
                  'CONN_MAX_AGE': 300,
              }
          }

          REDIS = {
              'tasks': {
                  'HOST': 'localhost',
                  'PORT': 6379,
                  'USERNAME': '',
                  'PASSWORD': '',
                  'DATABASE': 0,
                  'SSL': False,
              },
              'caching': {
                  'HOST': 'localhost',
                  'PORT': 6379,
                  'USERNAME': '',
                  'PASSWORD': '',
                  'DATABASE': 1,
                  'SSL': False,
              }
          }

          SECRET_KEY = '{{ netbox_secret_key.stdout }}'

          API_TOKEN_PEPPERS = {
              1: '{{ netbox_api_pepper.stdout }}',
          }
    - name: Run netbox update
      ansible.builtin.command: /opt/netbox/upgrade.sh

    - name: Create NetBox superuser (hard-coded) CHATGPT
      ansible.builtin.command: >
        /opt/netbox/venv/bin/python3 manage.py createsuperuser
        --noinput
        --username admin
        --email wlouis339@gmail.com
      args:
        chdir: /opt/netbox/netbox
      environment:
        DJANGO_SUPERUSER_PASSWORD: "Kinessanova2008!"

    - name: Install NetBox main systemd service
      ansible.builtin.copy:
        src: /opt/netbox/contrib/netbox.service
        dest: /etc/systemd/system/netbox.service
        remote_src: yes

    - name: Install NetBox RQ systemd service
      ansible.builtin.copy:
        src: /opt/netbox/contrib/netbox-rq.service
        dest: /etc/systemd/system/netbox-rq.service
        remote_src: yes

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable NetBox services
      systemd:
        name: netbox
        enabled: yes
        state: started

    - name: Enable NetBox RQ service
      systemd:
        name: netbox-rq
        enabled: yes
        state: started

    - name: Generate NetBox private key
      community.crypto.openssl_privatekey:
        path: /etc/ssl/private/netbox.key
        size: 2048
        type: RSA

    - name: Generate NetBox self-signed certificate (IP SAN)  CHATTTT
      community.crypto.x509_certificate:
        path: /etc/ssl/certs/netbox.crt
        privatekey_path: /etc/ssl/private/netbox.key
        provider: selfsigned
        selfsigned_not_after: "+365d"
        subject:
          common_name: "{{ ansible_host }}"
        subject_alt_name:
          - "IP:{{ ansible_host }}"

    - name: Set certificate permissions
      file:
        path: /etc/ssl/certs/netbox.crt
        owner: root
        group: root
        mode: "0644"

    - name: Set key permissions
      file:
        path: /etc/ssl/private/netbox.key
        owner: root
        group: root
        mode: "0600"

    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx

    - name: Copy nginx config
      ansible.builtin.copy:
        src: /opt/netbox/contrib/nginx.conf
        dest: /etc/nginx/sites/available/netbox
        remote_src: yes

    - name: Set NetBox nginx server_name to IP
      lineinfile:
        path: /etc/nginx/sites-available/netbox
        regexp: '^\s*server_name'
        line: "    server_name {{ ansible_host }};"

    - name: restart Nginx
      ansible.builtin.systemd_service:
        state: restart
        name: nginx