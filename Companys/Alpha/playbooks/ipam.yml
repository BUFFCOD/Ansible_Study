---
- name: Install netbox
  hosts: all
  become: true
  gather_facts: yes
  tasks:
    - name: Update machine
      ansible.builtin.apt:
        upgrade: full
        update_cache: yes

    - name: Install Python PostgreSQL library
      ansible.builtin.apt:
        name: python3-psycopg2
        state: present
        update_cache: yes

    - name: Install Postgres SQL
      ansible.builtin.apt:
        name: postgresql
        state: present

    - name: Install ACL package
      ansible.builtin.apt:
        name: acl
        state: present

    - name: Create Netbox DB Progres
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: netbox

    - name: Create DB User
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        login_db: netbox
        name: netbox
        password: AlphaNetbox
        expires: infinity

    - name: Makes Netbox the owner of DB
      become: true
      become_user: postgres
      community.postgresql.postgresql_db:
        name: netbox
        owner: netbox
        state: present

    - name: Grant Create privs on public Scheme
      become: true
      become_user: postgres
      community.postgresql.postgresql_privs:
        db: netbox
        type: schema
        objs: public
        roles: netbox
        privs: CREATE
        state: present

    - name: Install Redis
      ansible.builtin.apt:
        name: redis-server
        state: present

    - name: Install Netbox Dependenicies
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3
          - python3-pip
          - python3-venv
          - python3.12-venv
          - python3-dev
          - build-essential
          - libxml2-dev
          - libxslt1-dev
          - libffi-dev
          - libpq-dev
          - libssl-dev
          - zlib1g-dev
        state: present
        update_cache: yes

    - name: Create netbox directory
      file:
        path: /opt/netbox-v4.5.9
        state: directory

    - name: Download netbox tarball file
      ansible.builtin.get_url:
        url: https://github.com/netbox-community/netbox/archive/refs/tags/v4.5.9.tar.gz
        dest: /opt/netbox-v4.5.9

    - name: Unarchive tarball file
      ansible.builtin.unarchive:
        src: /opt/netbox-v4.5.9/netbox-4.5.9.tar.gz
        dest: /opt/netbox-v4.5.9
        remote_src: yes

    - name: Symlink netbox-V X.X.X  to netbox
      ansible.builtin.file:
        src: /opt/netbox-v4.5.9/netbox-4.5.9
        dest: /opt/netbox
        state: link

    - name: Add netbox user account
      ansible.builtin.user:
        name: netbox
        system: yes
        create_home: no
        shell: /usr/sbin/nologin

    - name: Ensure NetBox directories have correct ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: netbox
        group: netbox
        recurse: yes
      loop:
        - /opt/netbox/netbox/media/
        - /opt/netbox/netbox/reports/
        - /opt/netbox/netbox/scripts/
        # This part for ownership was done by chat

    - name: copy config file
      ansible.builtin.copy:
        src: /opt/netbox/netbox/netbox/configuration_example.py
        dest: /opt/netbox/netbox/netbox/configuration.py
        remote_src: yes
        owner: netbox
        group: netbox
        mode: "0644"

    - name: Generate NetBox SECRET_KEY
      ansible.builtin.command:
        cmd: python3 /opt/netbox/netbox/generate_secret_key.py
      register: netbox_secret_key
      changed_when: false
      ### Chat

    - name: Generate NetBox API token pepper
      ansible.builtin.command:
        cmd: python3 /opt/netbox/netbox/generate_secret_key.py
      register: netbox_api_pepper
      changed_when: false
      ### CHAT

    ###
    - name: Deploy configuration.py
      ansible.builtin.copy:
        dest: /opt/netbox/netbox/netbox/configuration.py
        owner: netbox
        group: netbox
        mode: '0640'
        backup: yes
        content: |
          #########################
          #                       #
          #   Required settings   #
          #                       #
          #########################

          ALLOWED_HOSTS = ['*']

          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'NAME': 'netbox',
                  'USER': 'netbox',
                  'PASSWORD': 'AlphaNetbox',
                  'HOST': 'localhost',
                  'PORT': '',
                  'CONN_MAX_AGE': 300,
              }
          }

          REDIS = {
              'tasks': {
                  'HOST': 'localhost',
                  'PORT': 6379,
                  'USERNAME': '',
                  'PASSWORD': '',
                  'DATABASE': 0,
                  'SSL': False,
              },
              'caching': {
                  'HOST': 'localhost',
                  'PORT': 6379,
                  'USERNAME': '',
                  'PASSWORD': '',
                  'DATABASE': 1,
                  'SSL': False,
              }
          }

          SECRET_KEY = '{{ netbox_secret_key.stdout }}'

          API_TOKEN_PEPPERS = {
              1: '{{ netbox_api_pepper.stdout }}',
          }

          #########################
          #                       #
          #   Optional settings   #
          #                       #
          #########################

          ADMINS = []

          AUTH_PASSWORD_VALIDATORS = []

          BASE_PATH = ''

          CORS_ORIGIN_ALLOW_ALL = False
          CORS_ORIGIN_WHITELIST = []
          CORS_ORIGIN_REGEX_WHITELIST = []

          CSRF_COOKIE_NAME = 'csrftoken'

          DEBUG = False

          DEFAULT_LANGUAGE = 'en-us'

          EMAIL = {
              'SERVER': 'localhost',
              'PORT': 25,
              'USERNAME': '',
              'PASSWORD': '',
              'USE_SSL': False,
              'USE_TLS': False,
              'TIMEOUT': 10,
              'FROM_EMAIL': '',
          }

          EXEMPT_VIEW_PERMISSIONS = []

          INTERNAL_IPS = ('127.0.0.1', '::1')

          LOGGING = {}

          LOGIN_PERSISTENCE = False
          LOGIN_REQUIRED = True
          LOGIN_TIMEOUT = None
          LOGIN_FORM_HIDDEN = False

          LOGOUT_REDIRECT_URL = 'home'

          METRICS_ENABLED = False

          PLUGINS = []

          REMOTE_AUTH_ENABLED = False
          REMOTE_AUTH_BACKEND = 'netbox.authentication.RemoteUserBackend'
          REMOTE_AUTH_HEADER = 'HTTP_REMOTE_USER'
          REMOTE_AUTH_USER_FIRST_NAME = 'HTTP_REMOTE_USER_FIRST_NAME'
          REMOTE_AUTH_USER_LAST_NAME = 'HTTP_REMOTE_USER_LAST_NAME'
          REMOTE_AUTH_USER_EMAIL = 'HTTP_REMOTE_USER_EMAIL'
          REMOTE_AUTH_AUTO_CREATE_USER = True
          REMOTE_AUTH_DEFAULT_GROUPS = []
          REMOTE_AUTH_DEFAULT_PERMISSIONS = {}

          RELEASE_CHECK_URL = None

          RQ_DEFAULT_TIMEOUT = 300

          SESSION_COOKIE_NAME = 'sessionid'
          SESSION_FILE_PATH = None

          TIME_ZONE = 'UTC'
      no_log: true

    - name: Run netbox update
      ansible.builtin.command: /opt/netbox/upgrade.sh

    - name: Create NetBox superuser
      ansible.builtin.command: >
        /opt/netbox/venv/bin/python3 manage.py createsuperuser
        --noinput
        --username admin
        --email wlouis339@gmail.com
      args:
        chdir: /opt/netbox/netbox
      environment:
        DJANGO_SUPERUSER_PASSWORD: "Kinessanova2008!"
      register: superuser_result
      failed_when:
        - superuser_result.rc != 0
        - "'already taken' not in superuser_result.stderr"
      changed_when: superuser_result.rc == 0
      no_log: true

    - name: Copy gunicorn config
      ansible.builtin.copy:
        src: /opt/netbox/contrib/gunicorn.py
        dest: /opt/netbox/gunicorn.py
        remote_src: yes
        owner: root
        group: root
        mode: '0644'
        force: no        # don't overwrite if already customized

    - name: Install NetBox main systemd service
      ansible.builtin.copy:
        src: /opt/netbox/contrib/netbox.service
        dest: /etc/systemd/system/netbox.service
        remote_src: yes

    - name: Install NetBox RQ systemd service
      ansible.builtin.copy:
        src: /opt/netbox/contrib/netbox-rq.service
        dest: /etc/systemd/system/netbox-rq.service
        remote_src: yes

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable NetBox services
      systemd:
        name: netbox
        enabled: yes
        state: started

    - name: Enable NetBox RQ service
      systemd:
        name: netbox-rq
        enabled: yes
        state: started

    - name: Generate NetBox private key
      community.crypto.openssl_privatekey:
        path: /etc/ssl/private/netbox.key
        size: 2048
        type: RSA

    - name: Generate NetBox CSR
      community.crypto.openssl_csr:
        path: /etc/ssl/certs/netbox.csr
        privatekey_path: /etc/ssl/private/netbox.key
        common_name: "{{ ansible_host }}"
        subject_alt_name:
          - "IP:{{ ansible_host }}"

    - name: Generate NetBox self-signed certificate
      community.crypto.x509_certificate:
        path: /etc/ssl/certs/netbox.crt
        privatekey_path: /etc/ssl/private/netbox.key
        csr_path: /etc/ssl/certs/netbox.csr
        provider: selfsigned
        selfsigned_not_after: "+365d"

    - name: Set certificate permissions
      file:
        path: /etc/ssl/certs/netbox.crt
        owner: root
        group: root
        mode: "0644"

    - name: Set key permissions
      file:
        path: /etc/ssl/private/netbox.key
        owner: root
        group: root
        mode: "0600"

    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx

    - name: Copy nginx config
      ansible.builtin.copy:
        src: /opt/netbox/contrib/nginx.conf
        dest: /etc/nginx/sites-available/netbox
        remote_src: yes

    - name: Set NetBox nginx server_name to IP
      lineinfile:
        path: /etc/nginx/sites-available/netbox
        regexp: '^\s*server_name'
        line: "    server_name {{ ansible_host }};"

    - name: restart Nginx
      ansible.builtin.systemd_service:
        state: restarted
        name: nginx

    - name: Create netbox home directory
      ansible.builtin.file:
        path: /home/netbox
        state: directory
        owner: netbox
        group: netbox
        mode: '0755'

# 3. nginx symlink never created
    - name: Enable NetBox nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/netbox
        dest: /etc/nginx/sites-enabled/netbox
        state: link

    # 4. default nginx site never removed (was intercepting traffic)
    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # 5. nginx never reloaded after config changes
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
